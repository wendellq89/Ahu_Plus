name: 功能建议
description: 提一个新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 你在使用过程中遇到了什么不便? 或希望补足什么场景?
      placeholder: 例如:课表页希望能看到调课提示。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你设想的实现方式。可以是 UI 草图、交互描述、参考 App、技术路线等。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 (可选)
      description: 是否考虑过其他做法? 为什么不选?

  - type: textarea
    id: context
    attributes:
      label: 其他上下文 (可选)
      description: 参考链接、截图、相关 issue 等
